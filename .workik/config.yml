version: 2
project:
  name: ERP-eCommerce
  module: ecommerce
stack:
  frontend: nextjs16
  ui: shadcn
  styling: tailwind-v4
  architecture: workik-feature-slices
contracts:
  api: cosmo-graphql
  realtime: centrifugo
  auth: authentik-oidc
  objectStorage: rustfs-s3
  events: redpanda
featureSlices:
  - name: control-center
    paths:
      services: src/features/control-center/services
      hooks: src/features/control-center/hooks
      ui: src/features/control-center/ui
