apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: erp-ecommerce-slo-alerts
  labels:
    app: erp-ecommerce
spec:
  groups:
    - name: erp-ecommerce.slo
      rules:
        - alert: ERPeCommerceHighLatencyP95
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.210
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ERP-eCommerce p95 latency is above target"
        - alert: ERPeCommerceAvailabilityBudgetBurn
          expr: (1 - (sum(rate(http_requests_total{status!~"5.."}[15m])) / sum(rate(http_requests_total[15m])))) > 0.000500
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "ERP-eCommerce error budget burn is above threshold"
