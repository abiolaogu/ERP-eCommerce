name: Sovereign GA Phases

on:
  push:
    branches: ["main", "master", "develop", "codex/**"]
  pull_request:
  workflow_dispatch:

jobs:
  phase0-foundation:
    name: Phase 0 - Foundation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify sovereign artifacts
        run: |
          test -f docs/SOVEREIGN_GA_IMPLEMENTATION.md
          test -f docs/SOVEREIGN_PROMPT_EXECUTION.md
          test -f infra/sovereign/ga-contract.yaml

  phase1-data-cache:
    name: Phase 1 - Data and Cache
    runs-on: ubuntu-latest
    needs: [phase0-foundation]
    steps:
      - uses: actions/checkout@v4
      - name: Verify tenancy data contracts
        run: |
          test -f infra/sovereign/data/tenant-rls.sql
          test -f infra/sovereign/aidd/guardrail-policy.yaml

  phase2-eventing:
    name: Phase 2 - Eventing and Realtime
    runs-on: ubuntu-latest
    needs: [phase1-data-cache]
    steps:
      - uses: actions/checkout@v4
      - name: Verify event + realtime contracts
        run: |
          test -f infra/sovereign/events/topic-contracts.yaml
          test -f infra/sovereign/realtime/channel-contracts.yaml

  phase3-application:
    name: Phase 3 - Application Build and UX
    runs-on: ubuntu-latest
    needs: [phase2-eventing]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ hashFiles('web/package.json') != '' }}
        with:
          node-version: 20
      - name: Install web dependencies
        if: ${{ hashFiles('web/package.json') != '' }}
        run: npm ci --prefix web || npm install --prefix web
      - name: Web lint
        if: ${{ hashFiles('web/package.json') != '' }}
        run: npm run lint --prefix web --if-present
      - name: Web test
        if: ${{ hashFiles('web/package.json') != '' }}
        run: npm run test --prefix web --if-present
      - name: Web build
        if: ${{ hashFiles('web/package.json') != '' }}
        run: npm run build --prefix web --if-present

  phase4-reliability-security:
    name: Phase 4 - Reliability and Security
    runs-on: ubuntu-latest
    needs: [phase3-application]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        if: ${{ hashFiles('go.mod') != '' }}
        with:
          go-version: "1.22"
      - name: Go guardrail tests
        if: ${{ hashFiles('go.mod') != '' }}
        run: go test ./pkg/aiddguardrail/... -v
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ hashFiles('Cargo.toml') != '' }}
      - name: Rust tests
        if: ${{ hashFiles('Cargo.toml') != '' }}
        run: |
          if [ -f crates/aidd-guardrail/Cargo.toml ]; then
            cargo test -p aidd-guardrail
          elif [ -f src/aidd_guardrail.rs ]; then
            cargo test --lib aidd_guardrail
          else
            echo "No AIDD rust guardrail module found; skipping."
          fi

  phase5-ga-readiness:
    name: Phase 5 - GA Readiness
    runs-on: ubuntu-latest
    needs: [phase4-reliability-security]
    steps:
      - uses: actions/checkout@v4
      - name: Verify runbook and scorecard
        run: |
          test -f docs/SOVEREIGN_GA_READINESS_SCORECARD.md
          test -f infra/sovereign/ops/release-checklist.md
