name: Bug Report

description: Report a defect in docs, architecture guidance, or operational procedure.

title: "[Bug]: "

labels:
  - bug
  - docs

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug.
    validations:
      required: true

  - type: input
    id: affected-doc
    attributes:
      label: Affected Document Path
      description: Example: docs/03-quality-devops/CI-CD.md
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: PRD/ADR References
      description: Link relevant PRD or ADR sections.

  - type: textarea
    id: proposed-fix
    attributes:
      label: Proposed Fix

