actions:
  - name: PlaceOrder
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/checkout"
      timeout: 30
      forward_client_headers: true
    permissions:
      - role: editor
      - role: admin
  - name: ProcessPayment
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/checkout"
      timeout: 30
      forward_client_headers: true
    permissions:
      - role: editor
      - role: admin
  - name: CreateFulfillment
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/fulfillment"
      timeout: 30
      forward_client_headers: true
    permissions:
      - role: editor
      - role: admin
  - name: IssueRefund
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/checkout"
      timeout: 60
      forward_client_headers: true
    permissions:
      - role: admin
  - name: UpdateInventory
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/storefront"
      timeout: 30
      forward_client_headers: true
    permissions:
      - role: editor
      - role: admin
  - name: ApplyPromotion
    definition:
      kind: synchronous
      handler: "{{ACTIONS_BASE_URL}}/v1/loyalty"
      timeout: 30
      forward_client_headers: true
    permissions:
      - role: editor
      - role: admin
