- table:
    schema: public
    name: ecom_products
  select_permissions:
    - role: viewer
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
        limit: 100
        allow_aggregations: true
    - role: editor
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
        allow_aggregations: true
    - role: admin
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
        allow_aggregations: true
    - role: aidd_operator
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
        limit: 5000
        allow_aggregations: true
  insert_permissions:
    - role: editor
      permission:
        columns: "*"
        check:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
    - role: admin
      permission:
        columns: "*"
        check:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
  update_permissions:
    - role: editor
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
    - role: admin
      permission:
        columns: "*"
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
  event_triggers:
    - name: ecom_products_audit
      definition:
        enable_manual: false
        insert:
          columns: "*"
        update:
          columns: "*"
        delete:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
      webhook: "{{ACTIONS_BASE_URL}}/api/v1/webhooks/aidd-audit"

